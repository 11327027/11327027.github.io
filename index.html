<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人網頁練習</title>
    <style>
        /* 基礎風格設定 */
        :root {
            --primary-blue: #0984e3;
            --bg-gray: #f4f7f6;
            --text-dark: #2d3436;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            line-height: 1.6;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h2 {
            color: var(--primary-blue);
            font-size: 1.4em;
            margin-bottom: 15px;
        }

        .skill-tag {
            display: inline-block;
            background: #e1f0ff;
            color: #0066cc;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.9em;
            margin: 0 5px 10px 0;
        }

        /* --- 響應式顯示切換邏輯 --- */
        
        /* 預設：隱藏電腦版內容，顯示手機版內容 */
        .desktop-content { display: none; }
        .mobile-content { display: block; }

        /* 當螢幕寬度大於 768px (桌電/平板) */
        @media (min-width: 768px) {
            .mobile-content { display: none; }
            .desktop-content { display: block; }
            
            body { padding: 50px; }
            .container { padding: 50px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>趙宇倫</h1>
        <p> 朝陽科技大學 | 資訊工程系</p>
    </header>

    <section>
        <h2>👋 個人簡介</h2>
        
        <div class="mobile-content">
            <p>我是趙宇倫，目前就讀資工系。我熱衷於學習程式開發與邏輯挑戰，並提升自己的技術能力。</p>
        </div>

        <div class="desktop-content">
            <p>你好！我是趙宇倫，目前就讀在朝陽科大資工系。在大學期間，我想掌握了電腦科學的核心基礎。</p>
        </div>
    </section>

    <section>
        <h2>🛠️ 興趣與專長</h2>

        <div class="mobile-content">
            <ul>
                <li><strong>語言：</strong> C/C++, Python</li>
                <li><strong>工具：</strong> Git, GitHub, VS Code</li>
            </ul>
        </div>

        <div class="desktop-content">
            <p><strong>💻 正在學習開發語言：</strong></p>
            <div class="skill-tags">
                <span class="skill-tag">C / C++</span>
                <span class="skill-tag">Python </span>
                <span class="skill-tag">Java</span>
                <span class="skill-tag">HTML </span>
            </div>
            
        </div>
    </section>
</div>
    
</body>
</html>
